# 6502 SBC - Graphics Demo Configuration
# Run:  bin/sbc6502.exe demo.ini
#       (or: make demo)

[cpu]
speed_hz = 0        # unlimited speed — CPU runs as fast as host allows
debug    = 0         # 1 = start in monitor
model    = 6502      # 6502 (NMOS) or 65c02 (CMOS)

# 32 KB SRAM
[sram]
base = 0x0000
size = 0x8000

# 16 KB Demo ROM at $C000-$FFFF (vectors at $FFFA-$FFFF)
[rom]
base = 0xC000
size = 0x4000
file = roms/demo.rom
