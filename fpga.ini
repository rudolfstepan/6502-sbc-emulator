[cpu]
speed_hz = 27000000
debug    = 0
model    = 65c02

[sram]
base = 0x0000
size = 0x8000

# FPGA split shadow ROM image:
#   file offset $0000-$2FFF -> CPU $A000-$CFFF (EhBASIC/application)
#   file offset $3000-$3FFF -> CPU $F000-$FFFF (kernel + vectors)
[rom]
base = 0xA000
size = 0x3000
file = roms/fpga_ehbasic_16kb.rom
offset = 0x0000

[rom]
base = 0xF000
size = 0x1000
file = roms/fpga_ehbasic_16kb.rom
offset = 0x3000

[via]
base = 0x8800

[uart]
base = 0x8810
mode = stdio

[disk]
base = 0x8824
path = data/disk
