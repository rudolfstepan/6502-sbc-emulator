name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libsdl2-dev \
            cc65 \
            curl \
            python3

      - name: Build emulator
        run: make check

      - name: Generate test ROM
        run: python3 tools/make_test_rom.py
