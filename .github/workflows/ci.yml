name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build emulator
        run: make check

      - name: Generate test ROM
        run: python3 tools/make_test_rom.py
