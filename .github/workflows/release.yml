name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsdl2-dev cc65 curl python3

      - name: Build runtime bundle
        run: |
          make clean
          make
          make roms

      - name: Package Linux bundle
        run: |
          tar -C . -czf sbc6502-linux-x86_64.tar.gz bin

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbc6502-linux-x86_64
          path: sbc6502-linux-x86_64.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install cross-build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-mingw-w64-x86-64 \
            cc65 \
            curl \
            tar \
            python3

      - name: Build ROMs for runtime bundle
        run: make roms

      - name: Download SDL2 MinGW development package
        run: |
          SDL_VERSION=2.30.11
          curl -fsSL -o SDL2-devel-mingw.tar.gz \
            "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VERSION}/SDL2-devel-${SDL_VERSION}-mingw.tar.gz"
          tar -xzf SDL2-devel-mingw.tar.gz
          echo "SDL_PREFIX=$PWD/SDL2-${SDL_VERSION}/x86_64-w64-mingw32" >> "$GITHUB_ENV"

      - name: Cross-compile Windows runtime bundle
        run: |
          mkdir -p bin

          x86_64-w64-mingw32-gcc \
            -std=c99 -Wall -Wextra -O2 -g \
            -I"${SDL_PREFIX}/include" -I"${SDL_PREFIX}/include/SDL2" -Dmain=SDL_main \
            src/*.c \
            -o bin/sbc6502.exe \
            -L"${SDL_PREFIX}/lib" -lmingw32 -lSDL2main -lSDL2 -lm

          cp "${SDL_PREFIX}/bin/SDL2.dll" bin/SDL2.dll

          for dll in libwinpthread-1.dll libgcc_s_seh-1.dll; do
            path="$(x86_64-w64-mingw32-gcc -print-file-name=${dll})"
            if [ -f "$path" ]; then
              cp "$path" "bin/${dll}"
            fi
          done

          bash tools/stage_runtime.sh bin

      - name: Verify Windows cross bundle
        run: |
          test -f bin/sbc6502.exe
          test -f bin/SDL2.dll
          test -f bin/chess.ini
          test -f bin/sbc.ini
          test -f bin/roms/chess.rom
          test -f bin/roms/kernel.rom
          test -f bin/roms/msbasic.rom

      - name: Upload Windows cross runtime bundle artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sbc6502-bin-windows-cross-${{ github.event_name }}-${{ github.run_number }}-${{ github.run_attempt }}
          path: bin/
          if-no-files-found: error
