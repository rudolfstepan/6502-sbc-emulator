# 6502 SBC Emulator - Configuration
# Lines starting with # are comments
# All addresses in hexadecimal (no 0x prefix needed, but 0x works too)

[cpu]
speed_hz = 1000000   # 1 MHz (0 = unlimited)
debug    = 0         # 1 = start in monitor
model    = 6502      # 6502 (NMOS) or 65c02 (CMOS)
trace    = 0         # 1 = enable instruction tracing (use -t flag to set output file)
profile  = 0         # 1 = dump CPU profiling statistics on exit

# ── SRAM ───────────────────────────────────────────────────────
[sram]
base = 0x0000
size = 0x8000        # 32 KB

# ── VIC (Video Interface Controller) ────────────────────────────
# VIC Video RAM: $8000-$87FF (2KB, dual-port, CPU accessible)
# Character ROM built-in (8x8 pixel font, 256 ASCII characters)
# Screen: 40x25 text mode

# ── ROM ────────────────────────────────────────────────────────
# Kernel ROM (4KB at $C000): jump table + I/O + welcome screen + command loop
[rom]
base = 0xC000
size = 0x1000
file = roms/kernel.rom

# MS BASIC ROM (12KB at $D000): MS BASIC V2, vectors at $FFFA point to kernel
[rom]
base = 0xD000
size = 0x3000
file = roms/msbasic.rom

# ── VIA 6522 ────────────────────────────────────────────────────
[via]
base = 0x8800        # 16 registers: $8800-$880F

# ── UART 6551 (ACIA) ─────────────────────────────────────────────
[uart]
base = 0x8810        # 4 registers: $8810-$8813
mode = stdio         # 'stdio'  - terminal on stdin/stdout
                     # 'tcp'    - TCP server (connect with: nc 127.0.0.1 2551)
# port = 2551        # TCP port (only used when mode=tcp)

# ── DISK MVP ────────────────────────────────────────────────────
[disk]
base = 0x8820        # 16 registers: $8820-$882F
path = data/disk     # host directory for BASIC save/load
