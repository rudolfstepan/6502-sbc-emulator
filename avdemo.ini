# 6502 SBC Emulator - Audio-Visual Demo
# Run: bin/sbc6502.exe avdemo.ini   (or: make avdemo)

[cpu]
speed_hz = 27000000  ; Tang FPGA effective CPU clock (0 = unlimited)

[sram]
base = 0x0000
size = 0x8000

[rom]
base = 0xC000
size = 0x4000
file = roms/avdemo.rom

[via]
base = 0x8800

[uart]
base = 0x8810
mode = stdio
