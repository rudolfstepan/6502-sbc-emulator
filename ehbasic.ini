[cpu]
speed_hz = 1000000
debug    = 0         # 1 = start in monitor
model    = 6502      # 6502 (NMOS) or 65c02 (CMOS)

[sram]
base = 0x0000
size = 0x8000

[rom]
base = 0xC000
size = 0x1000
file = roms/kernel.rom

[rom]
base = 0xD000
size = 0x3000
file = roms/ehbasic.rom

[via]
base = 0x8800

[uart]
base = 0x8810
mode = stdio

[disk]
base = 0x8820
path = data/disk
