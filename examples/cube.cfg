# Rotating high-resolution cube PRG for the FPGA runtime.
#
# Load address is $1000.  Drag/drop or --load starts there directly; from
# EhBASIC under fpga.ini use LOAD "CUBE" and then CALL 4096.
FEATURES {
    STARTADDRESS: default = $1000;
}
SYMBOLS {
    __LOADADDR__: type = weak, value = $1000;
}
MEMORY {
    HEADER: file = %O, start = $0000,       size = $0002;
    MAIN:   file = %O, start = __LOADADDR__, size = $5000;
}
SEGMENTS {
    EXEHDR: load = HEADER, type = ro;
    CODE:   load = MAIN,   type = ro;
    RODATA: load = MAIN,   type = ro;
}
