# MultiCalc PRG layout for the 6502 SBC FPGA.
#
# The real board only has ~24 KB of usable, contiguous RAM: $0000-$5FFF.
# $6000-$7FFF is the VIC bitmap-framebuffer window (NOT general RAM) and
# $8000+ is VIC text RAM / I/O.  So EVERYTHING - code, data, BSS and the cc65
# C stack - must live below $6000.  (The PC emulator has flat SRAM to $7FFF,
# which is why an earlier $8000 stack "worked" there but crashed on hardware.)
#
# Layout:
#   $0002-$001B  cc65 zero page
#   $0200-$0FFF  BSS (uninitialised worksheet state, ~3 KB)
#   $1000-$5A00  loaded image: startup + code + rodata + data   (load addr $1000)
#   $5A00-$6000  cc65 C stack (grows down from $6000)
#
# The PRG loads like a BASIC program at $0301.  The BASIC-visible part is only
# one tokenized line:
#
#   10 CALL 4096
#
# The cc65 machine-code image still starts at $1000.  The bytes between the
# BASIC end marker and $1000 are intentionally part of the PRG so EhBASIC's
# LOAD sets Svar past the complete hidden machine-code image.
FEATURES {
    STARTADDRESS: default = $1000;
}
SYMBOLS {
    __LOADADDR__:   type = weak, value = $1000;
    __STACKSIZE__:  type = weak, value = $05C0;   # ~1.4 KB C stack at $5A40-$6000
    __STACKSTART__: type = weak, value = $6000;   # top of usable RAM
    __ZPSTART__:    type = weak, value = $0002;
}
MEMORY {
    HEADER: file = %O,               start = $0000,       size = $0002;
    ZP:     file = "", define = yes, start = __ZPSTART__, size = $001A;
    BSSRAM: file = "", define = yes, start = $0200,       size = $0E00;
    MAIN:   file = %O,               start = $0301,
            size = __STACKSTART__ - __STACKSIZE__ - $0301;
}
SEGMENTS {
    EXEHDR:   load = HEADER,  type = ro;
    ZEROPAGE: load = ZP,      type = zp;
    BASIC:    load = MAIN,    type = ro;
    STARTUP:  load = MAIN,    type = ro;
    LOWCODE:  load = MAIN,    type = ro, optional = yes;
    ONCE:     load = MAIN,    type = ro, optional = yes;
    CODE:     load = MAIN,    type = ro;
    RODATA:   load = MAIN,    type = ro;
    DATA:     load = MAIN,    type = rw;
    BSS:      load = BSSRAM,  type = bss, define = yes;
}
FEATURES {
    CONDES: type = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type = destructor,
            label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type = interruptor,
            label = __INTERRUPTOR_TABLE__,
            count = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import = __CALLIRQ__;
}
