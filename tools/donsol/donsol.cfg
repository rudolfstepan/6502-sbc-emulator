MEMORY {
    ZP: start = $0002, size = $00FE, type = rw;
    RAM: start = $0200, size = $1E00, type = rw;
    ROM: start = $8000, size = $8000, type = ro;
}

SEGMENTS {
    ZEROPAGE: load = ZP, type = zp;
    CODE: load = ROM, type = ro;
    DATA: load = RAM, type = rw;
    BSS: load = RAM, type = bss;
}